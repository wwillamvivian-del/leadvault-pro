<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro</title>
    <style>
        body { background: #010408; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* THE MOVING GRID */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: linear-gradient(rgba(0, 210, 255, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.08) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; animation: grid 20s linear infinite; }
        @keyframes grid { from { background-position: 0 0; } to { background-position: 40px 40px; } }

        h1 { color: #00d2ff; text-transform: uppercase; letter-spacing: 3px; margin-top: 40px; text-shadow: 0 0 15px rgba(0, 210, 255, 0.5); }
        
        .search-box { width: 100%; max-width: 350px; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(0, 210, 255, 0.3); background: rgba(15, 20, 30, 0.9); color: white; outline: none; box-sizing: border-box; }

        /* FIXED GLASS CARDS */
        .card { width: 100%; max-width: 350px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; margin-bottom: 15px; box-sizing: border-box; text-align: left; }
        
        .status { font-size: 10px; font-weight: bold; color: #00ff88; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .name { font-size: 20px; font-weight: bold; margin: 5px 0; display: block; }
        .details { color: #aaa; font-size: 13px; }
    </style>
</head>
<body>
    <h1>LEADVAULT PRO</h1>
    <form class="search-box" action="/" method="get">
        <input type="text" name="search" placeholder="Scanning leads..." value="{{ query or '' }}">
    </form>

    {% for lead in leads %}
    <div class="card">
        <div class="status">{{ lead.Status }}</div>
        <span class="name">{{ lead.Name }}</span>
        <div class="details">{{ lead.Title }} • {{ lead.Company }}</div>
    </div>
    {% endfor %}
</body>
</html>
