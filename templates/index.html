<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthVault | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            background: #0B0E11; 
            color: #EAECEF; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PORTFOLIO SUMMARY */
        .summary-card {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(135deg, #1E2329 0%, #0B0E11 100%);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #2B3139;
            margin-top: 40px;
            margin-bottom: 30px;
            text-align: left;
        }

        .summary-label { font-size: 12px; color: #848E9C; text-transform: uppercase; letter-spacing: 1px; }
        .summary-value { font-size: 32px; font-weight: 700; margin: 10px 0; color: #FFFFFF; }
        .growth { color: #00C087; font-weight: 600; font-size: 14px; }

        /* ASSET GRID */
        .asset-card {
            width: 100%;
            max-width: 450px;
            background: #181A20;
            border: 1px solid #2B3139;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .asset-card:hover { transform: scale(1.02); border-color: #474D57; }

        .asset-info { display: flex; flex-direction: column; }
        .asset-name { font-weight: 700; font-size: 16px; color: #FFFFFF; }
        .asset-desc { font-size: 12px; color: #848E9C; margin-top: 4px; }

        .asset-stats { text-align: right; }
        .asset-price { font-weight: 600; font-size: 16px; display: block; }
        .asset-change { font-size: 12px; font-weight: 700; }
        
        .up { color: #00C087; }
        .down { color: #F6465D; }

        .nav-bar { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 18px; color: #F0B90B; } /* Gold logo */
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">WealthVault.</div>
        <div style="font-size: 20px;">🔔</div>
    </div>

    <div class="summary-card">
        <div class="summary-label">Total Portfolio Value</div>
        <div class="summary-value">$1,382,920.50</div>
        <div class="growth">▲ +8.2% ($104,200)</div>
    </div>

    <div style="width: 100%; max-width: 450px; margin-bottom: 15px; font-weight: 600; font-size: 14px; color: #848E9C;">
        Market Holdings
    </div>

    {% for lead in leads %}
    <div class="asset-card">
        <div class="asset-info">
            <span class="asset-name">{{ lead.Name }}</span>
            <span class="asset-desc">{{ lead.Title }}</span>
        </div>
        <div class="asset-stats">
            <span class="asset-price">{{ lead.Company }}</span>
            <span class="asset-change {% if '+' in lead.Status %}up{% else %}down{% endif %}">
                {{ lead.Status }}
            </span>
        </div>
    </div>
    {% endfor %}

    <a href="/admin_portal_77" style="margin-top: 30px; color: #848E9C; text-decoration: none; font-size: 12px;">Manage Assets</a>
</body>
</html>
