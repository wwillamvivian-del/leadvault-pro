<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro | Executive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;500&display=swap');
        
        body { 
            background: #FFFFFF; 
            color: #1a1a1a; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        /* HEADER */
        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 24px; 
            letter-spacing: 2px; 
            margin-top: 40px; 
            color: #D4AF37;
            text-transform: uppercase;
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 5px;
        }

        /* SEARCH BOX */
        .search-box { width: 100%; max-width: 400px; margin-bottom: 40px; }
        input { 
            width: 100%; 
            padding: 15px; 
            background: #f9f9f9; 
            border: 1px solid #e0e0e0; 
            color: #1a1a1a; 
            font-family: 'Inter', sans-serif; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 14px;
            border-radius: 4px;
            transition: border 0.3s;
        }
        input:focus { border: 1px solid #D4AF37; }

        /* LUXURY CARD */
        .card { 
            width: 100%; 
            max-width: 400px; 
            background: #ffffff; 
            border: 1px solid #e0e0e0; 
            padding: 25px; 
            margin-bottom: 20px; 
            position: relative; 
            box-sizing: border-box; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 4px solid #D4AF37; /* The Gold Accent Stripe */
        }
        
        .status { 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 10px; 
            color: #D4AF37; 
            font-weight: 700; 
        }
        
        .name { 
            font-family: 'Playfair Display', serif;
            font-size: 20px; 
            font-weight: 700; 
            margin-bottom: 8px; 
            display: block; 
            color: #1a1a1a; 
        }
        
        .details { 
            color: #666666; 
            font-size: 13px; 
            line-height: 1.6; 
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        
        .org-label { color: #D4AF37; font-weight: 600; font-size: 11px; }
    </style>
</head>
<body>
    <h1>Executive Database</h1>
    
    <form class="search-box" action="/" method="get">
        <input type="text" name="search" placeholder="Search verified assets..." value="{{ query or '' }}">
    </form>

    {% for lead in leads %}
    <div class="card">
        <div class="status">{{ lead.Status }}</div>
        <span class="name">{{ lead.Name }}</span>
        <div class="details">
            <span class="org-label">POSITION:</span> {{ lead.Title }}<br>
            <span class="org-label">ORGANIZATION:</span> {{ lead.Company }}
        </div>
    </div>
    {% endfor %}
</body>
</html>
