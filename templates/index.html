<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthVault | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { background: #fff; color: #1a1a1a; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: #fff; position: sticky; top: 0; z-index: 100;
        }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .promo-pill { 
            background: #f0f5ff; color: #2b61ff; padding: 6px 12px; border-radius: 20px; 
            font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 5px;
        }

        .container { padding: 0 20px; max-width: 480px; margin: auto; }
        
        .balance-section { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin: 20px 0 30px;
        }
        .balance-label { color: #666; font-size: 14px; font-weight: 500; margin-bottom: 5px; }
        .net-worth { font-size: 34px; font-weight: 700; color: #000; letter-spacing: -1px; }
        
        .sparkline { width: 100px; height: 40px; }

        .action-bar { display: flex; justify-content: space-between; margin-bottom: 35px; }
        .action-item { text-align: center; width: 18%; }
        .action-circle {
            width: 52px; height: 52px; background: #2b61ff; color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;
            font-size: 22px;
        }
        .action-label { font-size: 12px; font-weight: 500; color: #444; }
        
        .section-header { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .row {
            padding: 16px 0; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #f2f2f2;
        }
        .row-info { display: flex; align-items: center; gap: 15px; }
        .icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        
        .asset-name { font-weight: 700; font-size: 16px; margin: 0; }
        .asset-ticker { color: #888; font-size: 13px; font-weight: 500; margin-top: 2px; text-transform: uppercase; }
        
        .asset-stats { text-align: right; }
        .asset-price { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .growth-tag { color: #098551; font-weight: 600; font-size: 13px; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-around; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 24px;">☰</div>
        <div class="header-right">
            <div class="promo-pill">🎁 Get $10</div>
            <div style="font-size: 22px;">🔔</div>
        </div>
    </div>

    <div class="container">
        <div class="balance-section">
            <div>
                <div class="balance-label">Your balance</div>
                <div class="net-worth">$1,382,920.50</div>
            </div>
            <svg class="sparkline" viewBox="0 0 100 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 35C10 32 15 20 25 25C35 30 45 5 55 15C65 25 80 10 99 2" stroke="#2b61ff" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>

        <div class="action-bar">
            <div class="action-item"><div class="action-circle">＋</div><div class="action-label">Buy</div></div>
            <div class="action-item"><div class="action-circle">－</div><div class="action-label">Sell</div></div>
            <div class="action-item"><div class="action-circle">↑</div><div class="action-label">Send</div></div>
            <div class="action-item"><div class="action-circle">↓</div><div class="action-label">Receive</div></div>
            <div class="action-item"><div class="action-circle" style="font-size: 16px;">•••</div><div class="action-label">More</div></div>
        </div>

        <div class="section-header">Watchlist</div>

        <div class="row">
            <div class="row-info">
                <div class="icon" style="background:#fff4e5; color:#f7931a;">₿</div>
                <div><p class="asset-name">Bitcoin</p><p class="asset-ticker">BTC</p></div>
            </div>
            <div class="asset-stats"><p class="asset-price">$68,432.10</p><p class="growth-tag">+3.77%</p></div>
        </div>

        <div class="row">
            <div class="row-info">
                <div class="icon" style="background:#1e2330; color:#fff;">⬢</div>
                <div><p class="asset-name">Fetch.ai</p><p class="asset-ticker">FET</p></div>
            </div>
            <div class="asset-stats"><p class="asset-price">$2.45</p><p class="growth-tag">+4.10%</p></div>
        </div>

        <div class="row">
            <div class="row-info">
                <div class="icon" style="background:#673ab7; color:#fff;">g</div>
                <div><p class="asset-name">The Graph</p><p class="asset-ticker">GRT</p></div>
            </div>
            <div class="asset-stats"><p class="asset-price">$0.48</p><p class="growth-tag" style="color:#098551;">+13.81%</p></div>
        </div>

        <div class="row">
            <div class="row-info">
                <div class="icon" style="background:#ff4081; color:#fff;">₳</div>
                <div><p class="asset-name">Amp</p><p class="asset-ticker">AMP</p></div>
            </div>
            <div class="asset-stats"><p class="asset-price">$0.0308</p><p class="growth-tag" style="color:#098551;">+4.90%</p></div>
        </div>

        <div class="row">
            <div class="row-info">
                <div class="icon" style="background:#00d395; color:#fff;">⟠</div>
                <div><p class="asset-name">Compound</p><p class="asset-ticker">COMP</p></div>
            </div>
            <div class="asset-stats"><p class="asset-price">$135.31</p><p class="growth-tag" style="color:#098551;">+7.06%</p></div>
        </div>

        <div style="margin-bottom: 100px;"></div>
    </div>

    <div class="footer-nav">
        <div style="color: #2b61ff;">🏠</div>
        <div style="color: #888;">📊</div>
        <div style="color: #888;">🔄</div>
        <div style="color: #888;">👤</div>
    </div>
</body>
</html>
