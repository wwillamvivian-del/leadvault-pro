<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Investment | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            background: #f8fafd; color: #1a1a1a; font-family: 'Inter', sans-serif; margin: 0; padding: 0;
        }
        
        .header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: #fff; border-bottom: 1px solid #eee;
        }
        .greeting span { color: #2b61ff; font-weight: 700; }

        .container { padding: 20px; max-width: 480px; margin: auto; text-align: center; }
        
        .balance-label { color: #666; font-size: 13px; font-weight: 500; margin-top: 10px; }
        .net-worth { 
            font-size: 32px; font-weight: 700; margin: 5px 0 25px; color: #000; letter-spacing: -1px;
        }

        .action-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; }
        .action-circle {
            width: 48px; height: 48px; background: #2b61ff; color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;
            font-size: 20px; box-shadow: 0 4px 12px rgba(43, 97, 255, 0.3);
        }
        .action-label { font-size: 12px; font-weight: 500; color: #444; }
        
        /* WATCHLIST STYLE */
        .section-header { text-align: left; font-size: 18px; font-weight: 700; margin: 30px 0 15px; padding-left: 5px; }
        
        .row {
            background: #fff; padding: 16px 5px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #f0f0f0;
        }
        .row-info { display: flex; align-items: center; gap: 15px; text-align: left; }
        
        /* ASSET ICONS */
        .icon { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .icon-btc { background: #fff4e5; color: #f7931a; }
        .icon-fet { background: #eef2ff; color: #2b61ff; }
        .icon-grt { background: #f3f0ff; color: #673ab7; }
        .icon-tesla { background: #ffebee; color: #e81123; }

        .asset-name { font-weight: 700; font-size: 16px; color: #000; margin: 0; }
        .asset-ticker { font-weight: 500; font-size: 13px; color: #888; text-transform: uppercase; margin: 2px 0 0; }
        
        .asset-stats { text-align: right; }
        .asset-price { font-weight: 600; font-size: 15px; color: #000; margin-bottom: 4px; }
        .growth-tag { color: #098551; font-weight: 600; font-size: 13px; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-around; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 20px;">☰</div>
        <div class="greeting">Tesla <span>Investment</span></div>
        <div style="font-size: 20px;">🔔</div>
    </div>

    <div class="container">
        <div class="balance-label">Your balance</div>
        <div class="net-worth">$1,382,920.50</div>

        <div class="action-bar">
            <div class="action-circle">＋</div>
            <div class="action-circle">－</div>
            <div class="action-circle">↑</div>
            <div class="action-circle">↓</div>
        </div>

        <div class="section-header">Watchlist</div>

        <div class="row">
            <div class="row-info">
                <div class="icon icon-btc">₿</div>
                <div>
                    <p class="asset-name">Bitcoin</p>
                    <p class="asset-ticker">BTC</p>
                </div>
            </div>
            <div class="asset-stats">
                <p class="asset-price">$68,432.10</p>
                <p class="growth-tag">+3.77%</p>
            </div>
        </div>

        <div class="row">
            <div class="row-info">
                <div class="icon icon-tesla">T</div>
                <div>
                    <p class="asset-name">Tesla Inc.</p>
                    <p class="asset-ticker">TSLA</p>
                </div>
            </div>
            <div class="asset-stats">
                <p class="asset-price">$175.22</p>
                <p class="growth-tag">+1.45%</p>
            </div>
        </div>

        <div class="row">
            <div class="row-info">
                <div class="icon icon-fet">⬢</div>
                <div>
                    <p class="asset-name">Fetch.ai</p>
                    <p class="asset-ticker">FET</p>
                </div>
            </div>
            <div class="asset-stats">
                <p class="asset-price">$2.45</p>
                <p class="growth-tag">+4.10%</p>
            </div>
        </div>

        <div style="margin-bottom: 100px;"></div>
    </div>

    <div class="footer-nav">
        <div style="color: #2b61ff;">🏠<br><span style="font-size: 10px;">Home</span></div>
        <div style="color: #888;">📊<br><span style="font-size: 10px;">Assets</span></div>
        <div style="color: #888;">🔄<br><span style="font-size: 10px;">Trade</span></div>
        <div style="color: #888;">👤<br><span style="font-size: 10px;">Profile</span></div>
    </div>
</body>
</html>
