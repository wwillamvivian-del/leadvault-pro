<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro | Executive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            background: #121212; 
            color: #D4AF37; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 26px; 
            letter-spacing: 1px; 
            margin-top: 40px; 
            color: #D4AF37;
            text-transform: uppercase;
            text-align: center;
        }

        .search-box { width: 100%; max-width: 400px; margin-bottom: 40px; }
        input { 
            width: 100%; 
            padding: 15px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 14px;
        }

        .card { 
            width: 100%; 
            max-width: 400px; 
            background: #1a1a1a; 
            border: 1px solid #222; 
            padding: 25px; 
            margin-bottom: 20px; 
            position: relative; 
            box-sizing: border-box; 
            border-left: 3px solid #D4AF37;
        }
        
        .status { 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 12px; 
            color: #D4AF37; 
            font-weight: 600; 
        }
        
        .name { 
            font-family: 'Playfair Display', serif;
            font-size: 22px; 
            margin-bottom: 10px; 
            display: block; 
            color: #ffffff; 
        }
        
        .details { 
            color: #999; 
            font-size: 13px; 
            line-height: 1.6; 
            border-top: 1px solid #222;
            padding-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .label { color: #D4AF37; font-weight: 600; margin-right: 5px; }

        .footer {
            margin-top: 40px;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #222;
            width: 100%;
            max-width: 400px;
        }

        .buy-btn {
            display: inline-block;
            background: #D4AF37;
            color: #000;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>EXECUTIVE DATABASE</h1>
    
    <form class="search-box" action="/" method="get">
        <input type="text" name="search" placeholder="SEARCH ASSETS..." value="{{ query or '' }}">
    </form>

    {% for lead in leads %}
    <div class="card">
        <div class="status">{{ lead.Status }}</div>
        <span class="name">{{ lead.Name }}</span>
        <div class="details">
            <span class="label">POSITION:</span> {{ lead.Title }}<br>
            <span class="label">ORGANIZATION:</span> {{ lead.Company }}
        </div>
    </div>
    {% endfor %}

    <div class="footer">
        <div style="font-size: 11px; color: #666; letter-spacing: 2px;">PROPRIETARY ASSET V1.0</div>
        <a href="mailto:your-email@example.com" class="buy-btn">ACQUIRE FULL DATABASE</a>
    </div>
</body>
</html>
