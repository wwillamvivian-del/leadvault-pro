<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px; 
            -webkit-font-smoothing: antialiased;
        }

        /* THE TOP DESIGN PIECE */
        .brand-header {
            margin-top: 40px;
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid #28A745;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #28A745;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.2);
        }

        h1 { 
            font-size: 22px; 
            letter-spacing: -0.5px;
            margin: 0;
            font-weight: 700;
        }
        
        .sub-header {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* SEARCH AREA */
        .search-box { width: 100%; max-width: 400px; margin-bottom: 30px; }
        input { 
            width: 100%; 
            padding: 16px; 
            background: #1c1c1e; 
            border: 1px solid #2c2c2e; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 15px;
            border-radius: 12px;
        }

        /* DIRECTORY CARDS */
        .card { 
            width: 100%; 
            max-width: 400px; 
            background: #1c1c1e; 
            padding: 20px; 
            margin-bottom: 15px; 
            box-sizing: border-box;
            border-radius: 16px;
            border: 1px solid #2c2c2e;
        }
        
        .status-tag { 
            font-size: 10px; 
            text-transform: uppercase; 
            color: #28A745; 
            font-weight: 700; 
            background: rgba(40, 167, 69, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 12px;
        }
        
        .name { 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            display: block; 
        }
        
        .info-row { color: #8e8e93; font-size: 13px; margin-top: 4px; }
        .label { color: #555; font-weight: 600; margin-right: 4px; }

        .btn-container {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .buy-btn {
            display: block;
            background: #ffffff;
            color: #000000;
            padding: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="brand-header">
        <div class="logo-icon">LV</div>
        <h1>Executive Directory</h1>
        <div class="sub-header">Market Intelligence Platform</div>
    </div>
    
    <form class="search-box" action="/" method="get">
        <input type="text" name="search" placeholder="Search verified contacts..." value="{{ query or '' }}">
    </form>

    {% for lead in leads %}
    <div class="card">
        <div class="status-tag">{{ lead.Status }}</div>
        <span class="name">{{ lead.Name }}</span>
        <div class="info-row"><span class="label">POS:</span> {{ lead.Title }}</div>
        <div class="info-row"><span class="label">ORG:</span> {{ lead.Company }}</div>
    </div>
    {% endfor %}

    <div class="btn-container">
        <a href="mailto:YOUR_ACTUAL_EMAIL@GMAIL.COM" class="buy-btn">Acquire Full Database</a>
    </div>
</body>
</html>
