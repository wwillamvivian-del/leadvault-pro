<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro | Directory</title>
    <style>
        /* APPLE INSPIRED MINIMALIST DESIGN */
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Inter:wght@400;600&display=swap');
        
        body { 
            background: #FFFFFF; /* Crisp White Background */
            color: #111111; /* Sharp Black Text */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 30px; 
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        h1 { 
            font-size: 24px; 
            letter-spacing: -0.5px;
            margin-top: 50px; 
            color: #000000;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .sub-header {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* MINIMALIST SEARCH BOX */
        .search-box { width: 100%; max-width: 450px; margin-bottom: 40px; position: relative; }
        input { 
            width: 100%; 
            padding: 16px 16px 16px 45px; 
            background: #F2F2F7; /* Light grey 'system' background */
            border: none; 
            color: #000; 
            font-family: 'Inter', sans-serif; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 15px;
            border-radius: 12px; /* Smooth, classic rounded corners */
            transition: background 0.2s;
        }
        input:focus { background: #E5E5EA; }
        
        /* SEARCH ICON ACCENT */
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.5;
        }

        /* MINIMALIST CARD */
        .card { 
            width: 100%; 
            max-width: 450px; 
            background: #ffffff; 
            padding: 25px; 
            margin-bottom: 25px; 
            position: relative; 
            box-sizing: border-box;
            border-radius: 16px; /* Aggressive corner radius */
            border: 1px solid #E5E5EA; /* Very light subtle border */
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01), 0 2px 4px -1px rgba(0,0,0,0.01);
            transition: all 0.2s ease;
        }
        .card:hover {
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.03), 0 4px 6px -2px rgba(0,0,0,0.02);
            border-color: #D1D1D6;
        }
        
        /* GREEN SUCCESS ACCENT */
        .status { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 12px; 
            color: #28A745; /* SINGLE VIBRANT ACCENT */
            font-weight: 700; 
            display: inline-block;
            background: rgba(40, 167, 69, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .name { 
            font-size: 20px; 
            font-weight: 700; 
            margin-bottom: 10px; 
            display: block; 
            color: #000000;
        }
        
        .details { 
            color: #666; 
            font-size: 14px; 
            line-height: 1.6; 
            margin-top: 15px;
        }
        
        .label { color: #888; font-weight: 500; margin-right: 8px; }

        .footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        /* MINIMALIST 'CTA' BUTTON */
        .buy-btn {
            display: inline-block;
            background: #000000;
            color: #FFFFFF;
            padding: 14px 28px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        .buy-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Executive Directory</h1>
    <div class="sub-header">Verified Market Intelligence | V1.2</div>
    
    <form class="search-box" action="/" method="get">
        <input type="text" name="search" placeholder="Search verified contacts..." value="{{ query or '' }}">
    </form>

    {% for lead in leads %}
    <div class="card">
        <div class="status">{{ lead.Status }}</div>
        <span class="name">{{ lead.Name }}</span>
        <div class="details">
            <span class="label">POSITION:</span> {{ lead.Title }}<br>
            <span class="label">ORGANIZATION:</span> {{ lead.Company }}
        </div>
    </div>
    {% endfor %}

    <div class="footer">
        <a href="mailto:your-email@example.com" class="buy-btn">ACQUIRE DATABASE ACCESS</a>
    </div>
</body>
</html>
