<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Investment | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            background: #f8fafd; /* Clean, slightly blue-tinted silver */
            color: #1a1a1a; font-family: 'Inter', sans-serif; margin: 0; padding: 0;
        }
        
        .header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: #fff; border-bottom: 1px solid #eee;
        }
        .greeting span { color: #2b61ff; font-weight: 700; }

        .container { padding: 20px; max-width: 480px; margin: auto; text-align: center; }
        
        /* CENTERED COMPACT BALANCE */
        .balance-label { color: #666; font-size: 13px; font-weight: 500; margin-top: 10px; }
        .net-worth { 
            font-size: 32px; font-weight: 700; margin: 5px 0 25px; color: #000;
            letter-spacing: -1px;
        }

        /* THE BLUE ACTION CIRCLES */
        .action-bar {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 35px;
        }
        .action-item { text-decoration: none; color: #1a1a1a; width: 60px; }
        .action-circle {
            width: 48px; height: 48px;
            background: #2b61ff; /* RADIANT BLUE */
            color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px; font-size: 20px; font-weight: 600;
            box-shadow: 0 4px 12px rgba(43, 97, 255, 0.3);
            transition: 0.2s;
        }
        .action-circle:active { transform: scale(0.9); }
        .action-label { font-size: 12px; font-weight: 500; color: #444; }
        
        /* GLOWING SILVER ASSET ROWS */
        .section-header { text-align: left; font-size: 18px; font-weight: 700; margin-bottom: 15px; padding-left: 5px; }
        
        .row {
            background: #fff; border: 1px solid #f0f0f0; padding: 16px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .row-info { text-align: left; display: flex; align-items: center; gap: 12px; }
        .row-info h3 { margin: 0; font-size: 15px; color: #000; }
        .row-info p { margin: 0; color: #888; font-size: 12px; }
        
        .growth-tag { color: #098551; font-weight: 600; font-size: 13px; }
        .asset-price { font-weight: 600; font-size: 15px; color: #000; margin-bottom: 2px; }

        .footer-nav { border-top: 1px solid #eee; padding: 15px; display: flex; justify-content: space-around; background: #fff; position: fixed; bottom: 0; width: 100%; max-width: 480px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 20px;">☰</div>
        <div class="greeting">Tesla <span>Investment</span></div>
        <div style="font-size: 20px;">🔔</div>
    </div>

    <div class="container">
        <div class="balance-label">Your balance</div>
        <div class="net-worth">$1,382,920.50</div>

        <div class="action-bar">
            <div class="action-item">
                <div class="action-circle">＋</div>
                <div class="action-label">Buy</div>
            </div>
            <div class="action-item">
                <div class="action-circle">－</div>
                <div class="action-label">Sell</div>
            </div>
            <div class="action-item">
                <div class="action-circle">↑</div>
                <div class="action-label">Send</div>
            </div>
            <div class="action-item">
                <div class="action-circle">↓</div>
                <div class="action-label">Receive</div>
            </div>
        </div>

        <div class="section-header">Portfolio</div>
        {% for lead in leads %}
        <div class="row">
            <div class="row-info">
                <div style="width: 32px; height: 32px; background: #f0f3ff; border-radius: 50%; display: flex; align-items: center; justify-content: center;">💎</div>
                <div>
                    <h3>{{ lead.Name }}</h3>
                    <p>{{ lead.Title }}</p>
                </div>
            </div>
            <div style="text-align: right;">
                <div class="asset-price">{{ lead.Company }}</div>
                <div class="growth-tag">{{ lead.Status }}</div>
            </div>
        </div>
        {% endfor %}
        
        <div style="margin-bottom: 80px;"></div>
    </div>
</body>
</html>
