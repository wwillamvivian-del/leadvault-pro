<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro | HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;500&display=swap');

        body { background: #000; color: #00d2ff; font-family: 'Roboto Mono', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; overflow-x: hidden; }

        /* HUD SCANNING LINE */
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 210, 255, 0.2); box-shadow: 0 0 15px #00d2ff; animation: scan 4s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* THE GRID (Static/Faint) */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px); background-size: 20px 20px; z-index: -1; }

        h1 { font-size: 20px; letter-spacing: 5px; margin-top: 30px; border-bottom: 1px solid #00d2ff; padding-bottom: 10px; text-shadow: 0 0 10px #00d2ff; }

        .search-box { width: 100%; max-width: 380px; margin-bottom: 40px; }
        input { width: 100%; padding: 12px; background: transparent; border: 1px solid #00d2ff; color: #00d2ff; font-family: 'Roboto Mono', monospace; outline: none; box-sizing: border-box; text-transform: uppercase; font-size: 12px; }
        input::placeholder { color: rgba(0, 210, 255, 0.3); }

        /* HUD CARD WITH VIEW-FINDER CORNERS */
        .card { width: 100%; max-width: 380px; background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.2); padding: 20px; margin-bottom: 20px; position: relative; box-sizing: border-box; }
        
        /* The Bracket Corners */
        .card::before { content: ""; position: absolute; top: -2px; left: -2px; width: 15px; height: 15px; border-top: 2px solid #00d2ff; border-left: 2px solid #00d2ff; }
        .card::after { content: ""; position: absolute; bottom: -2px; right: -2px; width: 15px; height: 15px; border-bottom: 2px solid #00d2ff; border-right: 2px solid #00d2ff; }

        .status { font-size: 9px; margin-bottom: 10px; color: #00ff88; }
        .name { font-size: 18px; font-weight: 500; margin-bottom: 5px; display: block; }
        .details { color: rgba(0, 210, 255, 0.6); font-size: 12px; }
        
        .footer-tag { font-size: 10px; color: rgba(0, 210, 255, 0.3); margin-top: 20px; }
    </style>
</head>
<body>
