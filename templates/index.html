<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro | Corporate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            background: #0A192F; 
            color: #CCD6F6; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        /* CORPORATE HEADER */
        h1 { 
            font-size: 22px; 
            letter-spacing: 3px; 
            margin-top: 40px; 
            color: #E6F1FF;
            text-transform: uppercase;
            font-weight: 700;
            border-bottom: 2px solid #64FFDA; /* A hint of teal for "Secure" feel */
            padding-bottom: 8px;
        }

        .search-box { width: 100%; max-width: 400px; margin-bottom: 35px; }
        input { 
            width: 100%; 
            padding: 14px; 
            background: #112240; 
            border: 1px solid #233554; 
            color: #64FFDA; 
            font-family: 'Inter', sans-serif; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 13px;
            border-radius: 2px;
        }

        /* SILVER ACCENT CARD */
        .card { 
            width: 100%; 
            max-width: 400px; 
            background: #112240; 
            border: 1px solid #233554; 
            padding: 25px; 
            margin-bottom: 15px; 
            position: relative; 
            box-sizing: border-box;
            box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7);
            transition: transform 0.2s ease;
        }
        .card:hover {
            border-color: #C0C0C0;
            transform: translateY(-3px);
        }
        
        .status { 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 10px; 
            color: #8892B0; 
            font-weight: 600; 
        }
        
        .name { 
            font-size: 20px; 
            font-weight: 700; 
            margin-bottom: 10px; 
            display: block; 
            color: #E6F1FF; /* Clean White/Silver text */
        }
        
        .details { 
            color: #8892B0; 
            font-size: 12px; 
            line-height: 1.6; 
            border-top: 1px solid #233554;
            padding-top: 12px;
        }
        
        .label { color: #C0C0C0; font-weight: 600; margin-right: 5px; }

        .footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        .buy-btn {
            display: inline-block;
            background: transparent;
            color: #64FFDA;
            border: 1px solid #64FFDA;
            padding: 12px 20px;
            text-decoration: none;
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 1px;
            border-radius: 4px;
        }
        .buy-btn:hover {
            background: rgba(100, 255, 218, 0.1);
        }
    </style>
</head>
<body>
    <h1>Data Intelligence Portal</h1>
    
    <form class="search-box" action="/" method="get">
        <input type="text" name="search" placeholder="Query secure database..." value="{{ query or '' }}">
    </form>

    {% for lead in leads %}
    <div class="card">
        <div class="status">System Status: {{ lead.Status }}</div>
        <span class="name">{{ lead.Name }}</span>
        <div class="details">
            <span class="label">TITLE:</span> {{ lead.Title }}<br>
            <span class="label">CORP:</span> {{ lead.Company }}
        </div>
    </div>
    {% endfor %}

    <div class="footer">
        <a href="mailto:your-email@example.com" class="buy-btn">REQUEST FULL ACCESS</a>
    </div>
</body>
</html>
