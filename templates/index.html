<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro | Premium Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0a0e17; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* Glassmorphism Card */
        .dashboard {
            max-width: 500px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { font-size: 28px; background: linear-gradient(to right, #00d2ff, #92fe9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .tagline { color: #888; font-size: 14px; margin-bottom: 30px; }

        /* Donut Container */
        .chart-container { width: 220px; margin: 0 auto 30px; position: relative; }
        .chart-label { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); }
        .chart-label span { display: block; font-size: 24px; font-weight: bold; color: var(--primary); }

        .btn-unlock {
            display: block; width: 100%; padding: 18px; border-radius: 12px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white; font-weight: bold; text-decoration: none;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>LEADVAULT PRO</h1>
        <p class="tagline">Automated B2B Lead Intelligence</p>

        <div class="chart-container">
            <canvas id="donutChart"></canvas>
            <div class="chart-label">
                <span>12.4k</span>
                <small>LEADS</small>
            </div>
        </div>

        <div style="text-align:left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 25px;">
            <p style="margin:0; font-size: 12px; color: var(--primary);">LATEST VERIFIED:</p>
            <p style="margin:5px 0 0; font-weight: bold;">James Anderson • CEO</p>
            <p style="margin:0; font-size: 13px; color: #aaa;">TechFlow Solutions ($8.2M Rev)</p>
        </div>

        <a href="#" class="btn-unlock">UNLOCK FULL ACCESS ($49)</a>
    </div>

    <script>
        const ctx = document.getElementById('donutChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Solar', 'Tech', 'Distro'],
                datasets: [{
                    data: [45, 30, 25],
                    backgroundColor: ['#00d2ff', '#3a7bd5', '#00ff88'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: { cutouts: '80%', plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
