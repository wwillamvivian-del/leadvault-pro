<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthVault | Secure Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 360px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03); /* Subtle glass effect */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .logo { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        .logo span { color: #a855f7; }
        
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
        
        input {
            width: 100%;
            background: #111;
            border: 1px solid #222;
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #a855f7; background: #161616; }

        .btn-login {
            width: 100%;
            background: #fff;
            color: #000;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-login:hover { background: #a855f7; color: #fff; transform: translateY(-2px); }

        .footer-links { margin-top: 25px; font-size: 13px; color: #444; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Wealth<span>Vault</span></div>
        <div class="subtitle">Enter your private access keys.</div>
        
        <form method="POST">
            <div class="input-group">
                <label>Identifier</label>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Unlock Vault</button>
        </form>

        <div class="footer-links">
            Secure 256-bit Encryption Active
        </div>
    </div>
</body>
</html>
