<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .nav { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; }
        .hero { padding: 80px 20px; text-align: center; }
        .btn { background: #fff; color: #000; padding: 15px 30px; border-radius: 100px; text-decoration: none; font-weight: 700; }
        .upwork-green { color: #a855f7; }
    </style>
</head>
<body>
    <div class="nav">
        <div style="font-weight:700">Good evening, <span class="upwork-green">Partner</span></div>
        <div>🔔</div>
    </div>
    <div class="hero">
        <h1 style="font-size:40px; letter-spacing:-2px">Your fastest path <br>to production.</h1>
        <p style="color:#888; margin-bottom:40px">Secure infrastructure for your private assets.</p>
        <a href="/login" class="btn">Sign in to Vault</a>
    </div>
</body>
</html>
