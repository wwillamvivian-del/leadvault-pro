<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadVault Pro | Premium Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #00d2ff; 
            --secondary: #3a7bd5; 
            --accent: #00ff88;
            --dark: #05070a; 
        }

        /* The "Amazing" Animated Background */
        body { 
            background: var(--dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(58, 123, 213, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
            color: white; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glowing Mesh Effect */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            pointer-events: none;
        }

        .dashboard {
            width: 90%;
            max-width: 420px;
            background: rgba(15, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px; 
            padding: 40px 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 210, 255, 0.05);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 { 
            font-size: 32px; 
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 30%, var(--primary));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 0;
        }

        .tagline { color: #667; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 35px; }

        .chart-container { width: 240px; margin: 0 auto 35px; position: relative; }
        .chart-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .chart-label span { display: block; font-size: 28px; font-weight: 800; color: white; text-shadow: 0 0 15px var(--primary); }
        .chart-label small { color: #888; font-size: 10px; letter-spacing: 2px; }

        .data-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
            text-align: left;
        }

        .btn-unlock {
            display: block; width: 100%; padding: 20px; border-radius: 16px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white; font-weight: bold; text-decoration: none; font-size: 16px;
            box-shadow: 0 15px 30px rgba(58, 123, 213, 0.4);
            transition: transform 0.2s;
        }

        .btn-unlock:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>LEADVAULT PRO</h1>
        <p class="tagline">Premium Data Intelligence</p>

        <div class="chart-container">
            <canvas id="donutChart"></canvas>
            <div class="chart-label">
                <span>12,483</span>
                <small>VERIFIED LEADS</small>
            </div>
        </div>

        <div class="data-card">
            <p style="margin:0; font-size: 11px; color: var(--accent); font-weight: bold;">LIVE FEED • 5M-10M REVENUE</p>
            <p style="margin:8px 0 0; font-weight: bold; font-size: 18px;">James Anderson</p>
            <p style="margin:0; font-size: 14px; color: #888;">CEO, TechFlow Solutions</p>
        </div>

        <a href="#" class="btn-unlock">UNLOCK FULL VAULT ($49)</a>
    </div>

    <script>
        const ctx = document.getElementById('donutChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Solar', 'Tech', 'Distro'],
                datasets: [{
                    data: [45, 30, 25],
                    backgroundColor: ['#00d2ff', '#3a7bd5', '#00ff88'],
                    hoverBackgroundColor: ['#50e3ff', '#5b9dfa', '#54ffad'],
                    borderWidth: 0,
                    borderRadius: 10,
                    spacing: 5
                }]
            },
            options: { cutout: '85%', plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
